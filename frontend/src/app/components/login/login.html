<div class="bubblegum-bg min-h-screen flex items-center justify-center p-6 relative overflow-hidden font-body">
  
  <!-- BUBBLE DECORATIONS -->
  <div class="absolute top-[10%] left-[10%] w-[30%] h-[30%] rounded-full bg-pink-300/40 mix-blend-multiply filter blur-[80px] animate-blob"></div>
  <div class="absolute top-[20%] right-[10%] w-[30%] h-[30%] rounded-full bg-purple-300/40 mix-blend-multiply filter blur-[80px] animate-blob animation-delay-2000"></div>
  <div class="absolute bottom-[10%] left-[20%] w-[40%] h-[40%] rounded-full bg-indigo-300/40 mix-blend-multiply filter blur-[80px] animate-blob animation-delay-4000"></div>

  <!-- Login Container -->
  <div class="relative z-10 w-full max-w-md animate-fade-in-up">
    <!-- Login Card -->
    <div class="glass-panel p-10 md:p-12 relative overflow-hidden group">
      
      <!-- Decorative corner blob -->
      <div class="absolute -top-10 -right-10 w-32 h-32 bg-gradient-to-br from-pink-400 to-purple-500 rounded-full blur-2xl opacity-40 group-hover:opacity-60 transition-opacity duration-500 pointer-events-none"></div>

      <!-- Title Section -->
      <div class="text-center mb-10 relative">
        <div class="flex justify-center mb-4">
           <div class="w-14 h-14 rounded-2xl bg-gradient-to-tr from-pink-500 to-purple-500 flex items-center justify-center text-white shadow-lg shadow-pink-500/30">
            <span class="material-symbols-outlined text-[32px]">bubble_chart</span>
          </div>
        </div>
        <h1 class="font-extrabold text-4xl bg-clip-text text-transparent bg-gradient-to-r from-pink-600 to-purple-600 tracking-tight uppercase mb-1">
          BUBBLEGUM
        </h1>
        <p class="font-bold text-sm text-gray-500 tracking-widest uppercase">
          {{ isRegisterMode ? 'Tạo Tài Khoản Mới' : 'Workspace Login' }}
        </p>
      </div>

      <form class="space-y-5" (ngSubmit)="onSubmit()">
        <!-- Username -->
        <div class="space-y-1.5 focus-within-group">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1 flex items-center gap-2">
            Tài khoản
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-pink-500 transition-colors z-10" style="font-variation-settings: 'FILL' 1;">person</span>
            <input class="w-full bg-white/60 border border-white rounded-2xl pl-12 pr-4 py-3.5 focus:ring-2 focus:ring-pink-400 focus:bg-white transition-all font-medium placeholder-gray-400 outline-none shadow-inner" 
                   placeholder="Nhập tên đăng nhập" 
                   type="text"
                   [(ngModel)]="credentials.username"
                   name="username"/>
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-1.5 focus-within-group border-transparent">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1 flex items-center gap-2">
            Mật khẩu
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-purple-500 transition-colors z-10" style="font-variation-settings: 'FILL' 1;">lock</span>
            <input class="w-full bg-white/60 border border-white rounded-2xl pl-12 pr-12 py-3.5 focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all font-medium placeholder-gray-400 outline-none shadow-inner"
                   placeholder="••••••••"
                   type="password"
                   [(ngModel)]="credentials.password"
                   name="password">
            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-purple-600 transition-colors z-10" type="button">
              <span class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>

        <!-- Confirm Password (Only in Register Mode) -->
        <div *ngIf="isRegisterMode" class="space-y-1.5 focus-within-group transition-all duration-300">
          <label class="text-xs font-bold text-gray-500 uppercase tracking-wider ml-1 flex items-center gap-2">
            Xác nhận mật khẩu
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-purple-500 transition-colors z-10" style="font-variation-settings: 'FILL' 1;">lock</span>
            <input class="w-full bg-white/60 border border-white rounded-2xl pl-12 pr-12 py-3.5 focus:ring-2 focus:ring-purple-400 focus:bg-white transition-all font-medium placeholder-gray-400 outline-none shadow-inner"
                   placeholder="••••••••"
                   type="password"
                   [(ngModel)]="credentials.confirmPassword"
                   name="confirmPassword">
          </div>
        </div>

        <div *ngIf="errorMessage" class="text-rose-500 text-sm font-bold text-center bg-white/70 p-2 rounded-xl backdrop-blur-sm border border-white/50 shadow-inner">
          {{ errorMessage }}
        </div>

        

        <!-- Submit Button -->
        <button class="w-full mt-4 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-400 hover:to-purple-500 text-white font-bold text-lg py-4 rounded-2xl shadow-[0_8px_20px_rgba(236,72,153,0.3)] hover:shadow-[0_12px_25px_rgba(236,72,153,0.4)] transform hover:-translate-y-1 transition-all duration-300 flex items-center justify-center gap-2" type="submit">
          {{ isRegisterMode ? 'Đăng ký' : 'Đăng nhập' }}
          <span class="material-symbols-outlined text-[20px]">{{ isRegisterMode ? 'person_add' : 'login' }}</span>
        </button>
      </form>

      <!-- Footer Links -->
      <div class="mt-8 text-center pt-6 border-t border-gray-200/60">
        <p class="text-[13px] font-bold text-gray-500">
          {{ isRegisterMode ? 'Đã có tài khoản?' : 'Chưa có tài khoản?' }}
          <button type="button" (click)="toggleMode()" class="text-purple-600 hover:text-purple-700 hover:underline underline-offset-4 decoration-2 ml-1 cursor-pointer bg-transparent border-none">
             {{ isRegisterMode ? 'Đăng nhập ngay!' : 'Tạo tài khoản ngay!' }}
          </button>
        </p>
      </div>
    </div>
  </div>
</div>
